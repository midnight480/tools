name: Takumi Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: flatt-security/setup-takumi-guard-npm@v1
        with:
          bot-id: "BT01KMWSJ4TEBJXFM8PDM2EKJ6HJ" # midnight480
      - run: npm install
